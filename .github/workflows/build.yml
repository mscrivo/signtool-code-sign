name: "build-test"
on:
  pull_request:
  push:
    branches:
      - main
      - "releases/*"

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - name: Get pnpm store path
        shell: pwsh
        run: |
          $storePath = pnpm store path --silent
          "STORE_PATH=$storePath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build && pnpm run format && pnpm run lint && pnpm run package
      - run: pnpm test --coverage --coverageReporters=text-summary
      - name: Add coverage to summary
        if: always()
        run: |
          echo "## Test Coverage" >> $env:GITHUB_STEP_SUMMARY
          echo '```' >> $env:GITHUB_STEP_SUMMARY
          pnpm test --coverage --coverageReporters=text-summary 2>&1 | Select-String -Pattern "Statements|Branches|Functions|Lines|All files" >> $env:GITHUB_STEP_SUMMARY
          echo '```' >> $env:GITHUB_STEP_SUMMARY
  test-signing:
    runs-on: windows-latest
    # Skip for Dependabot PRs - secrets aren't available for security reasons
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v6
      - uses: ./
        with:
          certificate: "${{ secrets.CS_CERT_BASE64 }}"
          cert-password: "${{ secrets.CS_CERT_PASSWORD }}"
          cert-sha1: "${{ secrets.CS_CERT_HASH }}"
          cert-description: "Test"
          folder: "__tests__/dll"
          recursive: true
          timestamp-server: "http://timestamp.digicert.com"
